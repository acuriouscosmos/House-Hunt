<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>House Hunt — Jake &amp; Kate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #22303c;        /* harbor slate */
    --ink-soft: #55636f;
    --paper: #f6f4ef;      /* warm clapboard white */
    --card: #ffffff;
    --line: #dcd7cc;
    --brass: #b98a2e;      /* scores only */
    --sea: #16697a;        /* interactive */
    --sea-soft: #e3eef1;
    --bad: #a4402e;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Public Sans", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 30;
    background: var(--ink); color: #f2efe8;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 0;
  }
  .masthead { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .masthead h1 {
    font-family: "Zilla Slab", serif; font-weight: 700;
    font-size: 19px; margin: 0; letter-spacing: .02em; flex: 1;
  }
  .pill {
    background: none; border: 1px solid rgba(255,255,255,.35); color: inherit;
    border-radius: 999px; padding: 3px 12px; font-size: 13px; font-weight: 600;
  }
  .pill.on { background: var(--brass); border-color: var(--brass); color: #fff; }
  nav { display: flex; gap: 4px; margin-top: 8px; }
  nav button {
    flex: 1; background: none; border: none; color: rgba(242,239,232,.65);
    padding: 10px 0 12px; font-weight: 600; font-size: 14px;
    border-bottom: 3px solid transparent;
  }
  nav button.active { color: #fff; border-bottom-color: var(--brass); }

  main { max-width: 780px; margin: 0 auto; padding: 0 0 40px; }

  /* ---------- Status chip ---------- */
  #status {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 90; background: var(--ink); color: #fff; border-radius: 999px;
    padding: 6px 16px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #status.show { opacity: 1; }
  #status.err { background: var(--bad); }

  /* ---------- Browse ---------- */
  .listing-nav {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px 4px;
  }
  .listing-nav select {
    flex: 1; min-width: 0; font: inherit; font-weight: 600;
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--card); color: var(--ink);
  }
  .listing-nav button {
    width: 42px; height: 42px; border-radius: 8px; flex: none;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    font-size: 18px; font-weight: 700;
  }
  .listing-nav button:disabled { opacity: .35; cursor: default; }

  .pin {
    position: sticky; top: 92px; z-index: 20;
    background: var(--paper); padding-bottom: 6px;
    box-shadow: 0 8px 10px -10px rgba(34,48,60,.35);
  }
  .plate { padding: 6px 14px 8px; }
  .plate .addr-row { display: flex; align-items: flex-start; gap: 10px; }
  .plate .addr {
    font-family: "Zilla Slab", serif; font-weight: 600;
    font-size: 21px; line-height: 1.15; flex: 1;
  }
  .star-btn {
    flex: none; border: 1px solid var(--line); background: var(--card);
    border-radius: 8px; padding: 4px 12px; font-size: 15px; font-weight: 700;
    color: var(--ink-soft);
  }
  .star-btn.on { color: var(--brass); border-color: var(--brass); }
  .badge {
    display: inline-block; background: var(--sea-soft); color: var(--sea);
    border-radius: 6px; padding: 1px 8px; font-size: 11.5px; font-weight: 700;
    vertical-align: 2px; margin-left: 6px;
  }
  .plate .sub {
    display: flex; flex-wrap: wrap; gap: 4px 14px;
    color: var(--ink-soft); font-size: 13.5px; margin-top: 3px;
  }
  .plate .sub .price { color: var(--brass); font-weight: 700; }
  .plate a { color: var(--sea); font-weight: 600; text-decoration: none; }

  .rail {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 14px 8px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .rail img {
    height: 210px; border-radius: 8px; scroll-snap-align: start;
    background: #d8d4ca; flex: none; max-width: 88vw; object-fit: cover;
    cursor: zoom-in;
  }
  @media (min-width: 640px) { .rail img { height: 260px; } }
  .rail .none {
    height: 210px; flex: none; width: 100%; border-radius: 8px;
    background: #e7e3da; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }

  /* ---------- Lightbox ---------- */
  #lightbox {
    position: fixed; inset: 0; z-index: 200; background: rgba(12,18,23,.96);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  #lightbox img {
    max-width: 100vw; max-height: 100vh; object-fit: contain;
    user-select: none; -webkit-user-drag: none;
  }
  #lightbox .zone {
    position: absolute; top: 0; bottom: 0; width: 40%;
    background: none; border: none;
  }
  #lightbox .zone.left { left: 0; }
  #lightbox .zone.right { right: 0; }
  #lightbox .close {
    position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 12px;
    width: 44px; height: 44px; border-radius: 999px; border: none;
    background: rgba(255,255,255,.15); color: #fff; font-size: 22px; font-weight: 700;
  }
  #lightbox .count {
    position: absolute; bottom: calc(env(safe-area-inset-bottom) + 12px);
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.85); font-size: 13px; font-weight: 600;
    pointer-events: none;
  }

  /* ---------- Ratings ---------- */
  section.card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); margin: 12px 14px; padding: 14px;
  }
  .card h2 {
    font-family: "Zilla Slab", serif; font-size: 16px; font-weight: 700;
    margin: 0 0 10px; letter-spacing: .01em;
  }
  .crit { padding: 10px 0; border-top: 1px solid var(--line); }
  .crit:first-of-type { border-top: none; }
  .crit-head { display: flex; align-items: baseline; gap: 10px; }
  .crit-head .name { font-weight: 600; flex: 1; }
  .crit-head .partner { font-size: 12.5px; color: var(--ink-soft); }
  .crit-head .wt {
    display: flex; align-items: center; gap: 5px;
    font-size: 12.5px; color: var(--ink-soft);
  }
  .crit-head .wt input {
    width: 52px; font: inherit; padding: 3px 6px; text-align: center;
    border: 1px solid var(--line); border-radius: 6px; background: var(--paper);
  }
  .crit-head .del {
    border: none; background: none; color: var(--ink-soft);
    font-size: 15px; padding: 0 2px; line-height: 1;
  }
  .crit-head .del:hover { color: var(--bad); }
  .seg { display: flex; gap: 6px; margin-top: 8px; }
  .seg button {
    flex: 1; height: 42px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--paper);
    font-weight: 700; font-size: 15px; color: var(--ink-soft);
  }
  .seg button.on { background: var(--sea); border-color: var(--sea); color: #fff; }
  .seg button.clear { flex: none; width: 42px; font-size: 17px; }

  .add-crit {
    width: 100%; margin-top: 12px; padding: 11px;
    border: 1.5px dashed var(--sea); border-radius: 8px;
    background: var(--sea-soft); color: var(--sea); font-weight: 700;
  }
  .add-form { margin-top: 12px; display: none; gap: 8px; flex-wrap: wrap; }
  .add-form.open { display: flex; }
  .add-form input[type=text] {
    flex: 1 1 160px; font: inherit; padding: 9px 10px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .add-form input[type=number] {
    width: 90px; font: inherit; padding: 9px 10px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .add-form button {
    padding: 9px 16px; border-radius: 8px; border: none;
    background: var(--sea); color: #fff; font-weight: 700;
  }

  textarea#note {
    width: 100%; min-height: 96px; resize: vertical; font: inherit;
    padding: 10px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--paper);
  }

  /* ---------- Rankings & Contenders ---------- */
  .rank-controls {
    display: flex; gap: 8px; padding: 14px 14px 0; flex-wrap: wrap; align-items: center;
  }
  .rank-controls select {
    flex: 1; min-width: 140px; font: inherit; font-weight: 600;
    padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--card); color: var(--ink);
  }
  .toggle {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
  }
  .toggle input { width: 18px; height: 18px; accent-color: var(--sea); }
  .rank-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .rank-row {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 10px 12px; width: 100%;
  }
  .rank-row.ours { border-style: dashed; border-color: var(--brass); }
  .rank-row .pos {
    font-family: "Zilla Slab", serif; font-weight: 700; font-size: 18px;
    color: var(--ink-soft); width: 26px; flex: none; text-align: center;
  }
  .rank-row img {
    width: 64px; height: 48px; object-fit: cover; border-radius: 6px;
    background: #d8d4ca; flex: none;
  }
  .rank-row .mid { flex: 1; min-width: 0; }
  .rank-row .mid .a {
    font-weight: 600; font-size: 14.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rank-row .mid .b { font-size: 12.5px; color: var(--ink-soft); }
  .rank-row .row-star {
    flex: none; border: none; background: none; font-size: 21px;
    color: var(--line); padding: 4px;
  }
  .rank-row .row-star.on { color: var(--brass); }
  .rank-row .score {
    font-family: "Zilla Slab", serif; font-weight: 700; font-size: 21px;
    color: var(--brass); flex: none;
  }
  .rank-row .score small {
    font-size: 11px; color: var(--ink-soft); display: block; text-align: right;
    font-family: "Public Sans", sans-serif; font-weight: 600;
  }

  /* ---------- Compare ---------- */
  .cmp .selrow { display: flex; gap: 8px; margin-bottom: 10px; }
  .cmp .selrow select {
    flex: 1; min-width: 0; font: inherit; font-weight: 600; font-size: 13px;
    padding: 8px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--paper); color: var(--ink);
  }
  .cmp table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .cmp th, .cmp td {
    padding: 6px 8px; text-align: center; border-top: 1px solid var(--line);
  }
  .cmp th {
    font-family: "Zilla Slab", serif; font-size: 14px; border-top: none;
    max-width: 0; width: 38%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cmp td.lbl { text-align: left; color: var(--ink-soft); font-weight: 600; }
  .cmp td.win { color: var(--sea); font-weight: 700; background: var(--sea-soft); }
  .cmp tr.total td { font-weight: 700; border-top: 2px solid var(--line); }

  /* ---------- Overlays ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(34,48,60,.55);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay .box {
    background: var(--card); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 360px; text-align: center;
  }
  .overlay h2 { font-family: "Zilla Slab", serif; margin: 0 0 4px; }
  .overlay p { color: var(--ink-soft); font-size: 14px; margin: 0 0 18px; }
  .overlay .people { display: flex; gap: 10px; }
  .overlay .people button {
    flex: 1; padding: 16px 0; border-radius: 10px; font-size: 17px; font-weight: 700;
    border: 1.5px solid var(--sea); background: var(--sea-soft); color: var(--sea);
  }
  .overlay input {
    width: 100%; font: inherit; padding: 10px; margin-bottom: 12px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .overlay .go {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--sea); color: #fff; font-weight: 700; font-size: 15px;
  }
  .hidden { display: none !important; }
  .loading { text-align: center; color: var(--ink-soft); padding: 48px 0; }
</style>
</head>
<body>

<header id="header">
  <div class="masthead">
    <h1>House Hunt</h1>
    <button class="pill" id="blindBtn" title="Hide the other person's opinions">Blind</button>
    <button class="pill" id="whoBtn" title="Switch person">…</button>
  </div>
  <nav>
    <button id="tabBrowse" class="active">Browse</button>
    <button id="tabRank">Rankings</button>
    <button id="tabCont">Contenders</button>
  </nav>
</header>

<main>
  <div id="viewBrowse"><div class="loading">Loading listings…</div></div>
  <div id="viewRank" class="hidden"></div>
  <div id="viewCont" class="hidden"></div>
</main>

<div id="status"></div>

<div class="overlay hidden" id="secretOverlay">
  <div class="box">
    <h2>Connect to the sheet</h2>
    <p>Enter the shared secret (same one as in the extension). Stored only on this device.</p>
    <input type="password" id="secretInput" placeholder="Shared secret" autocomplete="off">
    <button class="go" id="secretGo">Connect</button>
  </div>
</div>

<div class="overlay hidden" id="whoOverlay">
  <div class="box">
    <h2>Who's rating?</h2>
    <p>Edits you make are saved under this name.</p>
    <div class="people" id="peopleBtns"></div>
  </div>
</div>

<script>
"use strict";

/* =============================== Config ================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbzoDRnlSwer6AB7hwHRirFA0wm3N9TJMaS8tSkqpLfI4F7oIMArSaTyFOl2gx-jUj7uaA/exec";
const PEOPLE = ["Jake", "Kate"];
const KEY = "Listing ID";
const log = (...a) => console.log("[HouseHunt]", ...a);

/* =============================== State ================================= */
const state = {
  secret: localStorage.getItem("hh_secret") || "",
  person: localStorage.getItem("hh_person") || "",
  blind: localStorage.getItem("hh_blind") === "1",
  showOurs: localStorage.getItem("hh_ours") !== "0",   // default on
  sortBy: localStorage.getItem("hh_sort") || "price-desc",
  hideRated: localStorage.getItem("hh_hiderated") === "1",
  data: null,
  current: 0,
  tab: "browse",
  rankBy: "Combined",
  cmpA: "",
  cmpB: "",
};

const partnerOf = (p) => PEOPLE.find((x) => x !== p);

/* ============================ API plumbing ============================= */
async function apiGet(action) {
  const url = `${API_URL}?secret=${encodeURIComponent(state.secret)}&action=${action}`;
  const res = await fetch(url);
  const body = await res.json();
  if (!body.ok) throw new Error(body.error || "request failed");
  return body;
}

async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // no CORS preflight
    body: JSON.stringify(Object.assign({ secret: state.secret }, payload)),
  });
  const body = await res.json();
  if (!body.ok) {
    const err = new Error(body.error || "request failed");
    err.server = true;   // server rejected it — retrying won't help
    throw err;
  }
  return body;
}

let statusTimer = null;
function flash(msg, isErr) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "show" + (isErr ? " err" : "");
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { el.className = ""; }, isErr ? 4000 : 1400);
}

/* --------------------- Save queue (offline-safe) ---------------------- */
/* Every write goes through a persisted FIFO queue. Network failures are
 * retried with backoff (order preserved); server rejections are dropped
 * so one bad job can't wedge the queue. Survives reloads via localStorage. */
const QUEUE_KEY = "hh_queue";
let saveQueue = [];
try { saveQueue = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); } catch (_) { saveQueue = []; }
let queueBusy = false;

function persistQueue() { localStorage.setItem(QUEUE_KEY, JSON.stringify(saveQueue)); }

function save(payload, label) {
  saveQueue.push({ payload: payload, label: label, tries: 0 });
  persistQueue();
  pumpQueue();
}

function pumpQueue() {
  if (queueBusy || !saveQueue.length) return;
  queueBusy = true;
  const job = saveQueue[0];
  apiPost(job.payload)
    .then(() => {
      saveQueue.shift(); persistQueue(); queueBusy = false;
      flash(job.label + " saved" + (saveQueue.length ? ` (${saveQueue.length} pending)` : ""));
      pumpQueue();
    })
    .catch((e) => {
      queueBusy = false;
      if (e.server) {
        // Rejected by the backend — retrying is pointless. Drop and surface it.
        log("save rejected, dropping:", job, e);
        saveQueue.shift(); persistQueue();
        flash(job.label + " rejected — " + e.message, true);
        pumpQueue();
        return;
      }
      job.tries++; persistQueue();
      const wait = Math.min(30000, 1000 * Math.pow(2, job.tries));
      log(`save failed (try ${job.tries}), retrying in ${wait}ms:`, e);
      flash(`Offline — ${saveQueue.length} unsaved change${saveQueue.length > 1 ? "s" : ""}, retrying`, true);
      setTimeout(pumpQueue, wait);
    });
}

window.addEventListener("online", pumpQueue);

/* ============================= Scoring ================================= */
/** Weighted score using that person's OWN weights. */
function personScore(listing, person) {
  const r = listing.ratings[person] || {};
  let num = 0, den = 0;
  for (const c of state.data.criteria) {
    const v = Number(r[c.name]);
    const w = c.weights[person] || 0;
    if (!isNaN(v) && r[c.name] !== "" && r[c.name] != null) {
      num += v * w;
      den += w;
    }
  }
  return den > 0 ? num / den : null;
}

function combinedScore(listing) {
  const parts = PEOPLE.map((p) => personScore(listing, p)).filter((s) => s != null);
  return parts.length ? parts.reduce((a, b) => a + b, 0) / parts.length : null;
}

/** Average raw rating on one criterion across the given people. */
function critScore(listing, crit, people) {
  const parts = people.map((p) => Number((listing.ratings[p] || {})[crit]))
    .filter((v) => !isNaN(v) && v > 0);
  return parts.length ? parts.reduce((a, b) => a + b, 0) / parts.length : null;
}

const fmtScore = (s) => (s == null ? "–" : (Math.round(s * 10) / 10).toFixed(1));

/** Robust numeric parse — handles "$401,000" style strings. */
const num = (v) => Number(String(v ?? "").replace(/[^0-9.\-]/g, "")) || 0;

/* ======================== Sorting & filtering ========================== */
function ratedCount(l, person) {
  const r = l.ratings[person] || {};
  return state.data.criteria.filter((c) => r[c.name] !== "" && r[c.name] != null).length;
}
function fullyRated(l) {
  return state.data.criteria.length > 0 &&
    ratedCount(l, state.person) >= state.data.criteria.length;
}

function sortListings() {
  if (state.blind && state.sortBy === "score-combined") state.sortBy = "score-mine";
  const price = (l) => num(l.spec["Price"]);
  const cmps = {
    "price-desc": (a, b) => price(b) - price(a),
    "price-asc": (a, b) => price(a) - price(b),
    "score-mine": (a, b) => (personScore(b, state.person) ?? -1) - (personScore(a, state.person) ?? -1),
    "score-combined": (a, b) => (combinedScore(b) ?? -1) - (combinedScore(a) ?? -1),
    "unrated-first": (a, b) => (ratedCount(a, state.person) - ratedCount(b, state.person)) || (price(b) - price(a)),
    "beds-desc": (a, b) => (num(b.spec["Beds"]) - num(a.spec["Beds"])) || (price(b) - price(a)),
    "baths-desc": (a, b) => (num(b.spec["Baths"]) - num(a.spec["Baths"])) || (price(b) - price(a)),
    "sqft-desc": (a, b) => num(b.spec["SqFt"]) - num(a.spec["SqFt"]),
    "lot-desc": (a, b) => num(b.spec["Lot SqFt"]) - num(a.spec["Lot SqFt"]),
    "ppsf-asc": (a, b) => num(a.spec["$/SqFt"]) - num(b.spec["$/SqFt"]),
    "ppsf-desc": (a, b) => num(b.spec["$/SqFt"]) - num(a.spec["$/SqFt"]),
  };
  state.data.listings.sort(cmps[state.sortBy] || cmps["price-desc"]);
}

/** Listings shown in Browse, after the hide-rated filter. */
function visibleListings() {
  return state.hideRated
    ? state.data.listings.filter((l) => !fullyRated(l))
    : state.data.listings;
}

function setHideRated(on) {
  state.hideRated = on;
  localStorage.setItem("hh_hiderated", on ? "1" : "0");
  state.current = 0;
  renderBrowse();
}

const listingById = (id) =>
  state.data.listings.find((l) => String(l.spec[KEY]) === String(id));

/* ===================== Staleness & price changes ======================= */
function daysSince(v) {
  const t = Date.parse(v);
  return isNaN(t) ? null : Math.floor((Date.now() - t) / 86400000);
}

/** Most recent price change for a listing, or null. Needs backend v4. */
function priceDelta(l) {
  const hist = (state.data.priceHistory || {})[String(l.spec[KEY])];
  if (!hist || !hist.length) return null;
  const last = hist[hist.length - 1];
  const d = num(last["To"]) - num(last["From"]);
  return d ? d : null;
}

function deltaBadge(l) {
  const d = priceDelta(l);
  if (!d) return "";
  const arrow = d < 0 ? "↓" : "↑";
  const color = d < 0 ? "var(--sea)" : "var(--bad)";
  return ` <span class="badge" style="color:${color}" title="Price change since first captured">${arrow} ${money(Math.abs(d))}</span>`;
}

/* ============================ Photo helpers ============================ */
function photoList(spec) {
  const raw = String(spec["Photos"] || "").trim();
  if (raw) return raw.split("|").filter(Boolean);
  return spec["Thumbnail"] ? [spec["Thumbnail"]] : [];
}
function sized(url, wh) {
  return url.replace(/origin\.jpg$/, wh + ".jpg");
}
function imgTag(url, wh, extra) {
  const small = sized(url, wh);
  return `<img loading="lazy" src="${small}" ${extra || ""}
    onerror="if(this.src!=='${url}'){this.src='${url}'}" alt="">`;
}

/* ============================= Lightbox ================================ */
const lightbox = { photos: [], at: 0 };

function openLightbox(photos, at) {
  lightbox.photos = photos;
  lightbox.at = at;
  const el = document.createElement("div");
  el.id = "lightbox";
  el.innerHTML = `
    <img id="lbImg" src="">
    <button class="zone left" aria-label="Previous photo"></button>
    <button class="zone right" aria-label="Next photo"></button>
    <button class="close" aria-label="Close">×</button>
    <div class="count" id="lbCount"></div>`;
  document.body.appendChild(el);
  el.querySelector(".zone.left").onclick = () => stepLightbox(-1);
  el.querySelector(".zone.right").onclick = () => stepLightbox(1);
  el.querySelector(".close").onclick = closeLightbox;
  document.addEventListener("keydown", lightboxKeys);
  showLightbox();
}

function showLightbox() {
  const url = lightbox.photos[lightbox.at];
  document.getElementById("lbImg").src = url;   // full-res original
  document.getElementById("lbCount").textContent =
    (lightbox.at + 1) + " / " + lightbox.photos.length;
}

function stepLightbox(d) {
  const n = lightbox.photos.length;
  lightbox.at = (lightbox.at + d + n) % n;
  showLightbox();
}

function closeLightbox() {
  const el = document.getElementById("lightbox");
  if (el) el.remove();
  document.removeEventListener("keydown", lightboxKeys);
}

function lightboxKeys(e) {
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") stepLightbox(-1);
  if (e.key === "ArrowRight") stepLightbox(1);
}

/* ============================ Browse view ============================== */
function money(v) {
  const n = num(v);
  return n ? "$" + n.toLocaleString("en-US") : "";
}

function starLabel(on) { return on ? "★ Contender" : "☆ Contender"; }

function renderBrowse() {
  const root = document.getElementById("viewBrowse");
  if (state.blind && state.sortBy === "score-combined") state.sortBy = "score-mine";
  const L = visibleListings();
  if (!L.length) {
    if (state.data.listings.length) {
      root.innerHTML = `<div class="loading">Every house is fully rated.<br><br>
        <button class="add-crit" id="clearFilter" style="max-width:240px">Show rated houses</button></div>`;
      document.getElementById("clearFilter").onclick = () => setHideRated(false);
    } else {
      root.innerHTML = `<div class="loading">No active listings. Favorite homes on Compass and reload.</div>`;
    }
    return;
  }
  state.current = Math.max(0, Math.min(state.current, L.length - 1));
  const item = L[state.current];
  const s = item.spec;
  const me = state.person;
  const partner = partnerOf(me);
  const photos = photoList(s);
  const starred = item.contenders.includes(me);

  const opts = L.map((l, i) =>
    `<option value="${i}" ${i === state.current ? "selected" : ""}>${esc(l.spec["Address"])}${l.manual ? " (our house)" : ""}</option>`).join("");

  const critRows = state.data.criteria.map((c) => {
    const mine = (item.ratings[me] || {})[c.name];
    const theirs = (item.ratings[partner] || {})[c.name];
    const myWt = c.weights[me];
    const segs = [1, 2, 3, 4, 5].map((v) =>
      `<button data-crit="${esc(c.name)}" data-val="${v}"
        class="${Number(mine) === v ? "on" : ""}">${v}</button>`).join("");
    return `
      <div class="crit">
        <div class="crit-head">
          <span class="name">${esc(c.name)}</span>
          ${state.blind ? "" : `<span class="partner">${esc(partner)}: ${theirs != null && theirs !== "" ? theirs : "–"} · wt ${c.weights[partner]}</span>`}
          <label class="wt">my wt <input type="number" step="0.5" min="0" value="${myWt}" data-wcrit="${esc(c.name)}"></label>
          <button class="del" data-dcrit="${esc(c.name)}" title="Delete this category">🗑</button>
        </div>
        <div class="seg">${segs}
          <button class="clear" data-crit="${esc(c.name)}" data-val="" title="Clear">×</button>
        </div>
      </div>`;
  }).join("");

  const sortOpts = [
    ["price-desc", "Price ↓"], ["price-asc", "Price ↑"],
    ["beds-desc", "Beds ↓"], ["baths-desc", "Baths ↓"],
    ["sqft-desc", "SqFt ↓"], ["lot-desc", "Lot SqFt ↓"],
    ["ppsf-asc", "$/SqFt ↑"], ["ppsf-desc", "$/SqFt ↓"],
    ["unrated-first", "Unrated first"], ["score-mine", "My score"],
  ].concat(state.blind ? [] : [["score-combined", "Combined score"]])
    .map(([v, t]) => `<option value="${v}" ${state.sortBy === v ? "selected" : ""}>Sort: ${t}</option>`).join("");

  root.innerHTML = `
    <div class="rank-controls">
      <select id="sortSel">${sortOpts}</select>
      <label class="toggle"><input type="checkbox" id="hideRatedChk" ${state.hideRated ? "checked" : ""}> Hide rated</label>
    </div>
    <div class="listing-nav">
      <button id="prev" ${state.current === 0 ? "disabled" : ""}>‹</button>
      <select id="jump">${opts}</select>
      <button id="next" ${state.current === L.length - 1 ? "disabled" : ""}>›</button>
    </div>
    <div class="pin" id="pin">
      <div class="plate">
        <div class="addr-row">
          <div class="addr">${esc(s["Address"])}${item.manual ? `<span class="badge">Our house</span>` : ""}</div>
          <button class="star-btn ${starred ? "on" : ""}" id="starBtn">${starLabel(starred)}</button>
        </div>
        <div class="sub">
          <span class="price">${money(s["Price"])}${deltaBadge(item)}</span>
          <span>${s["Beds"]} bd · ${s["Baths"]} ba · ${num(s["SqFt"]) ? num(s["SqFt"]).toLocaleString() + " sqft" : ""}</span>
          <span>${esc(s["City"])}</span>
          ${(() => { const d = item.manual ? null : daysSince(s["Captured"]);
            return d != null ? `<span title="Days since first captured">${d === 0 ? "captured today" : "captured " + d + "d ago"}</span>` : ""; })()}
          ${s["Compass URL"] ? `<a href="${s["Compass URL"]}" target="_blank" rel="noopener">Compass ↗</a>` : ""}
        </div>
      </div>
      <div class="rail" id="rail">
        ${photos.length ? photos.map((u, i) => imgTag(u, "900x600", `data-pidx="${i}"`)).join("") : `<div class="none">No photos captured yet</div>`}
      </div>
    </div>

    <section class="card">
      <h2>Ratings — ${esc(me)} <span style="color:var(--brass)">· score ${fmtScore(personScore(item, me))}</span></h2>
      ${critRows}
      <button class="add-crit" id="addCritBtn">+ Add rating category</button>
      <div class="add-form" id="addForm">
        <input type="text" id="newCritName" placeholder="Category name">
        <input type="number" id="newCritWt" placeholder="Weight" value="1" step="0.5" min="0">
        <button id="newCritGo">Add</button>
      </div>
    </section>

    <section class="card">
      <h2>Notes <span style="color:var(--ink-soft);font-weight:400;font-size:12.5px">(shared)</span></h2>
      <textarea id="note" placeholder="What stood out about this one?">${esc(item.note || "")}</textarea>
    </section>`;

  wireBrowse(item, photos);
  requestAnimationFrame(setPinOffset);
}

function wireBrowse(item, photos) {
  const id = String(item.spec[KEY]);
  const me = state.person;

  document.getElementById("prev").onclick = () => { state.current--; renderBrowse(); };
  document.getElementById("next").onclick = () => { state.current++; renderBrowse(); };
  document.getElementById("jump").onchange = (e) => { state.current = Number(e.target.value); renderBrowse(); };

  // Sort & filter
  document.getElementById("sortSel").onchange = (e) => {
    state.sortBy = e.target.value;
    localStorage.setItem("hh_sort", state.sortBy);
    sortListings();
    // Keep looking at the same house after re-sorting.
    state.current = Math.max(0, visibleListings().findIndex((l) => String(l.spec[KEY]) === id));
    renderBrowse();
  };
  document.getElementById("hideRatedChk").onchange = (e) => setHideRated(e.target.checked);

  // Fullscreen viewer
  document.querySelectorAll("#rail img").forEach((img) => {
    img.onclick = () => openLightbox(photos, Number(img.dataset.pidx));
  });

  // Contender star
  document.getElementById("starBtn").onclick = () => {
    toggleContender(item);
    renderBrowse();
  };

  // Ratings
  document.querySelectorAll(".seg button").forEach((b) => {
    b.onclick = () => {
      const crit = b.dataset.crit;
      const val = b.dataset.val === "" ? "" : Number(b.dataset.val);
      item.ratings[me] = item.ratings[me] || {};
      item.ratings[me][crit] = val;
      save({ action: "setRating", listingId: id, person: me, criterion: crit, rating: val }, "Rating");
      renderBrowse();
    };
  });

  // My weight
  document.querySelectorAll("input[data-wcrit]").forEach((inp) => {
    inp.onchange = () => {
      const crit = inp.dataset.wcrit;
      const w = Number(inp.value) || 0;
      const c = state.data.criteria.find((x) => x.name === crit);
      if (c) c.weights[me] = w;
      save({ action: "setWeight", criterion: crit, person: me, weight: w }, "Weight");
      renderBrowse();
    };
  });

  // Delete criterion (cascades to all ratings under it, both people)
  document.querySelectorAll("button[data-dcrit]").forEach((b) => {
    b.onclick = () => {
      const crit = b.dataset.dcrit;
      const sure = confirm(
        `Delete "${crit}" for everyone?\n\nThis removes the category AND every rating you and ${partnerOf(me)} have given under it, on all houses. This can't be undone.`);
      if (!sure) return;
      state.data.criteria = state.data.criteria.filter((c) => c.name !== crit);
      state.data.listings.forEach((l) => {
        PEOPLE.forEach((p) => { if (l.ratings[p]) delete l.ratings[p][crit]; });
      });
      save({ action: "deleteCriterion", criterion: crit }, "Category deletion");
      renderBrowse();
    };
  });

  // Add criterion
  const form = document.getElementById("addForm");
  document.getElementById("addCritBtn").onclick = () => {
    form.classList.toggle("open");
    if (form.classList.contains("open")) document.getElementById("newCritName").focus();
  };
  document.getElementById("newCritGo").onclick = () => {
    const name = document.getElementById("newCritName").value.trim();
    const wt = Number(document.getElementById("newCritWt").value) || 1;
    if (!name) return flash("Give the category a name", true);
    if (state.data.criteria.some((c) => c.name.toLowerCase() === name.toLowerCase())) {
      return flash("That category already exists", true);
    }
    const weights = {};
    PEOPLE.forEach((p) => { weights[p] = wt; });
    state.data.criteria.push({ name: name, weights: weights });
    save({ action: "addCriterion", criterion: name, weight: wt }, "Category");
    renderBrowse();
  };

  // Notes — debounce
  let noteTimer = null;
  document.getElementById("note").oninput = (e) => {
    item.note = e.target.value;
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() =>
      save({ action: "setNote", listingId: id, note: item.note }, "Note"), 900);
  };
}

function toggleContender(item) {
  const me = state.person;
  const on = !item.contenders.includes(me);
  if (on) item.contenders.push(me);
  else item.contenders = item.contenders.filter((p) => p !== me);
  save({ action: "setContender", listingId: String(item.spec[KEY]), person: me, on: on },
    on ? "Contender" : "Contender removal");
}

function setPinOffset() {
  const pin = document.getElementById("pin");
  if (pin) pin.style.top = document.getElementById("header").offsetHeight + "px";
}
window.addEventListener("resize", setPinOffset);

/* ============================ Rankings view ============================ */
function rankRow(x, i, label) {
  const s = x.l.spec;
  const thumb = photoList(s)[0];
  const starred = x.l.contenders.includes(state.person);
  const id = esc(String(s[KEY]));
  return `
    <button class="rank-row ${x.l.manual ? "ours" : ""}" data-id="${id}">
      <span class="pos">${i + 1}</span>
      ${thumb ? imgTag(thumb, "300x200") : `<img alt="">`}
      <span class="mid">
        <span class="a">${esc(s["Address"])}${x.l.manual ? `<span class="badge">Our house</span>` : ""}</span>
        <span class="b">${money(s["Price"])}${deltaBadge(x.l)} ${s["Beds"] ? `· ${s["Beds"]}bd ${s["Baths"]}ba` : ""} · ${esc(s["City"])}</span>
      </span>
      <span class="row-star ${starred ? "on" : ""}" data-star="${id}" role="button" title="Contender">★</span>
      <span class="score">${fmtScore(x.s)}<small>${esc(label)}</small></span>
    </button>`;
}

function wireRankRows(root) {
  root.querySelectorAll(".row-star").forEach((el) => {
    el.onclick = (e) => {
      e.stopPropagation();
      const l = listingById(el.dataset.star);
      if (l) toggleContender(l);
      state.tab === "rank" ? renderRank() : renderCont();
    };
  });
  root.querySelectorAll(".rank-row").forEach((r) => {
    r.onclick = () => {
      const l = listingById(r.dataset.id);
      if (!l) return;
      // If the hide-rated filter would hide this house, lift it quietly.
      if (state.hideRated && fullyRated(l)) {
        state.hideRated = false;
        localStorage.setItem("hh_hiderated", "0");
      }
      state.current = Math.max(0, visibleListings().indexOf(l));
      setTab("browse");
    };
  });
}

function renderRank() {
  const root = document.getElementById("viewRank");
  const me = state.person;

  // Blind mode: no combined, no partner, and criterion scores use only my ratings.
  if (state.blind && (state.rankBy === "Combined" || state.rankBy === partnerOf(me))) {
    state.rankBy = me;
  }
  const scorePeople = state.blind ? [me] : PEOPLE;

  let L = state.data.listings;
  if (!state.showOurs) L = L.filter((l) => !l.manual);

  const critOpts = state.data.criteria.map((c) =>
    `<option value="crit:${esc(c.name)}" ${state.rankBy === "crit:" + c.name ? "selected" : ""}>By: ${esc(c.name)}</option>`).join("");

  const overallOpts = state.blind
    ? `<option value="${me}" selected>Overall: ${me}</option>`
    : `<option value="Combined" ${state.rankBy === "Combined" ? "selected" : ""}>Overall: Combined</option>
       <option value="Jake" ${state.rankBy === "Jake" ? "selected" : ""}>Overall: Jake</option>
       <option value="Kate" ${state.rankBy === "Kate" ? "selected" : ""}>Overall: Kate</option>`;

  const scored = L.map((l) => {
    let s;
    if (state.rankBy === "Combined") s = combinedScore(l);
    else if (PEOPLE.includes(state.rankBy)) s = personScore(l, state.rankBy);
    else s = critScore(l, state.rankBy.slice(5), scorePeople);
    return { l: l, s: s };
  }).sort((a, b) => (b.s ?? -1) - (a.s ?? -1));

  const label = state.rankBy.startsWith("crit:") ? state.rankBy.slice(5)
    : state.rankBy === "Combined" ? "combined" : state.rankBy;

  root.innerHTML = `
    <div class="rank-controls">
      <select id="rankBy">${overallOpts}${critOpts}</select>
      <label class="toggle"><input type="checkbox" id="oursToggle" ${state.showOurs ? "checked" : ""}> Our house</label>
    </div>
    <div class="rank-list">${scored.map((x, i) => rankRow(x, i, label)).join("") || `<div class="loading">Nothing rated yet.</div>`}</div>`;

  document.getElementById("rankBy").onchange = (e) => { state.rankBy = e.target.value; renderRank(); };
  document.getElementById("oursToggle").onchange = (e) => {
    state.showOurs = e.target.checked;
    localStorage.setItem("hh_ours", state.showOurs ? "1" : "0");
    renderRank();
  };
  wireRankRows(root);
}

/* ============================ Compare view ============================= */
function compareHTML() {
  const L = state.data.listings;
  if (L.length < 2) return "";

  // Defaults: A = top contender (or first listing), B = our house if possible.
  const conts = L.filter((l) => l.contenders.length);
  if (!state.cmpA || !listingById(state.cmpA)) {
    state.cmpA = String((conts[0] || L[0]).spec[KEY]);
  }
  if (!state.cmpB || !listingById(state.cmpB) || state.cmpB === state.cmpA) {
    const ours = L.find((l) => l.manual);
    const alt = (ours && String(ours.spec[KEY]) !== state.cmpA)
      ? ours
      : conts.concat(L).find((l) => String(l.spec[KEY]) !== state.cmpA);
    state.cmpB = String(alt.spec[KEY]);
  }
  const A = listingById(state.cmpA);
  const B = listingById(state.cmpB);

  const opts = (cur) => L.map((l) => {
    const id = String(l.spec[KEY]);
    const tag = l.manual ? " (our house)" : (l.contenders.length ? " ★" : "");
    return `<option value="${esc(id)}" ${id === cur ? "selected" : ""}>${esc(l.spec["Address"])}${tag}</option>`;
  }).join("");

  // hi: highlight the larger numeric value as the winner.
  const row = (label, a, b, hi, total) => {
    let ca = "", cb = "";
    if (hi) {
      const na = num(a), nb = num(b);
      if (na !== nb && (na || nb)) (na > nb) ? (ca = " win") : (cb = " win");
    }
    const cls = total ? ` class="total"` : "";
    return `<tr${cls}><td class="lbl">${esc(label)}</td>
      <td class="${ca}">${a === "" || a == null ? "–" : a}</td>
      <td class="${cb}">${b === "" || b == null ? "–" : b}</td></tr>`;
  };

  const me = state.person, partner = partnerOf(me);
  const specRows =
    row("Price", money(A.spec["Price"]), money(B.spec["Price"])) +
    row("Beds", A.spec["Beds"], B.spec["Beds"], true) +
    row("Baths", A.spec["Baths"], B.spec["Baths"], true) +
    row("SqFt", num(A.spec["SqFt"]) ? num(A.spec["SqFt"]).toLocaleString() : "",
         num(B.spec["SqFt"]) ? num(B.spec["SqFt"]).toLocaleString() : "", true) +
    row("Year Built", A.spec["Year Built"], B.spec["Year Built"]) +
    row("City", esc(A.spec["City"]), esc(B.spec["City"]));

  const ratingCell = (l, crit) => {
    if (state.blind) {
      const v = (l.ratings[me] || {})[crit];
      return v === "" || v == null ? "" : String(v);
    }
    return PEOPLE.map((p) => {
      const v = (l.ratings[p] || {})[crit];
      return p[0] + ":" + (v === "" || v == null ? "–" : v);
    }).join(" · ");
  };
  // For win-highlighting use the average rating across visible people.
  const people = state.blind ? [me] : PEOPLE;
  const critRows = state.data.criteria.map((c) => {
    const cells = [A, B].map((l) => ratingCell(l, c.name));
    const avgs = [A, B].map((l) => critScore(l, c.name, people));
    let ca = "", cb = "";
    if (avgs[0] != null || avgs[1] != null) {
      const na = avgs[0] ?? -1, nb = avgs[1] ?? -1;
      if (na !== nb) (na > nb) ? (ca = " win") : (cb = " win");
    }
    return `<tr><td class="lbl">${esc(c.name)}</td>
      <td class="${ca}">${cells[0] || "–"}</td>
      <td class="${cb}">${cells[1] || "–"}</td></tr>`;
  }).join("");

  let totalRows = row("My score", fmtScore(personScore(A, me)), fmtScore(personScore(B, me)), true, true);
  if (!state.blind) {
    totalRows += row(partner + "'s score", fmtScore(personScore(A, partner)), fmtScore(personScore(B, partner)), true, true);
    totalRows += row("Combined", fmtScore(combinedScore(A)), fmtScore(combinedScore(B)), true, true);
  }

  return `
    <section class="card cmp">
      <h2>Head to head</h2>
      <div class="selrow">
        <select id="cmpA">${opts(state.cmpA)}</select>
        <select id="cmpB">${opts(state.cmpB)}</select>
      </div>
      <table>
        <tr><th></th><th>${esc(A.spec["Address"])}</th><th>${esc(B.spec["Address"])}</th></tr>
        ${specRows}${critRows}${totalRows}
      </table>
    </section>`;
}

function wireCompare(root) {
  ["cmpA", "cmpB"].forEach((sel) => {
    const el = root.querySelector("#" + sel);
    if (el) el.onchange = () => { state[sel] = el.value; renderCont(); };
  });
}

/* =========================== Contenders view =========================== */
function renderCont() {
  const root = document.getElementById("viewCont");
  const me = state.person;

  // Blind mode shows only my own stars; otherwise anyone's.
  const picked = state.data.listings.filter((l) =>
    state.blind ? l.contenders.includes(me) : l.contenders.length > 0);

  const scored = picked.map((l) => ({
    l: l,
    s: state.blind ? personScore(l, me) : combinedScore(l),
  })).sort((a, b) => (b.s ?? -1) - (a.s ?? -1));

  const label = state.blind ? me : "combined";

  const rows = scored.map((x, i) => {
    const whoBadges = state.blind ? "" :
      x.l.contenders.map((p) => `<span class="badge">${esc(p)} ★</span>`).join("");
    // Reuse rankRow, then splice the who-badges into the title line.
    return rankRow(x, i, label)
      .replace("</span>\n      <span class=\"b\">", whoBadges + "</span>\n      <span class=\"b\">");
  }).join("");

  root.innerHTML = `
    ${compareHTML()}
    <div class="rank-list" style="padding-top:0">${rows ||
      `<div class="loading">No contenders yet — tap ☆ on a house you love.</div>`}</div>`;
  wireCompare(root);
  wireRankRows(root);
}

/* ============================ Tabs & boot ============================== */
function setTab(tab) {
  state.tab = tab;
  const map = { browse: "viewBrowse", rank: "viewRank", cont: "viewCont" };
  ["browse", "rank", "cont"].forEach((t) => {
    document.getElementById("tab" + { browse: "Browse", rank: "Rank", cont: "Cont" }[t])
      .classList.toggle("active", t === tab);
    document.getElementById(map[t]).classList.toggle("hidden", t !== tab);
  });
  if (!state.data) return;
  if (tab === "browse") renderBrowse();
  else if (tab === "rank") renderRank();
  else renderCont();
}
document.getElementById("tabBrowse").onclick = () => setTab("browse");
document.getElementById("tabRank").onclick = () => setTab("rank");
document.getElementById("tabCont").onclick = () => setTab("cont");

/* Blind mode */
function refreshBlindBtn() {
  const b = document.getElementById("blindBtn");
  b.classList.toggle("on", state.blind);
  b.textContent = state.blind ? "Blind on" : "Blind";
}
document.getElementById("blindBtn").onclick = () => {
  state.blind = !state.blind;
  localStorage.setItem("hh_blind", state.blind ? "1" : "0");
  refreshBlindBtn();
  if (state.data) { sortListings(); setTab(state.tab); }
};

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function askSecret() {
  document.getElementById("secretOverlay").classList.remove("hidden");
  document.getElementById("secretGo").onclick = () => {
    const v = document.getElementById("secretInput").value.trim();
    if (!v) return;
    state.secret = v;
    localStorage.setItem("hh_secret", v);
    document.getElementById("secretOverlay").classList.add("hidden");
    boot();
  };
}

function askWho() {
  const box = document.getElementById("peopleBtns");
  box.innerHTML = PEOPLE.map((p) => `<button data-p="${p}">${p}</button>`).join("");
  box.querySelectorAll("button").forEach((b) => {
    b.onclick = () => {
      state.person = b.dataset.p;
      localStorage.setItem("hh_person", state.person);
      document.getElementById("whoOverlay").classList.add("hidden");
      refreshWhoBtn();
      if (state.data) setTab(state.tab);
    };
  });
  document.getElementById("whoOverlay").classList.remove("hidden");
}

function refreshWhoBtn() {
  document.getElementById("whoBtn").textContent = state.person || "…";
}
document.getElementById("whoBtn").onclick = askWho;

async function boot() {
  log("boot — loading listings");
  try {
    const body = await apiGet("listings");
    state.data = body;
    sortListings();
    log(`loaded ${body.listings.length} listings (${body.listings.filter(l => l.manual).length} manual), ${body.criteria.length} criteria`);
    setTab(state.tab);
  } catch (e) {
    log("load failed:", e);
    document.getElementById("viewBrowse").innerHTML =
      `<div class="loading">Couldn't load listings — ${esc(e.message)}.<br><br>
       <button class="go" style="max-width:220px;background:var(--sea);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700"
         onclick="localStorage.removeItem('hh_secret');location.reload()">Re-enter secret</button></div>`;
  }
}

refreshWhoBtn();
refreshBlindBtn();
if (!state.secret) askSecret();
else { boot(); pumpQueue(); /* flush anything left over from last session */ }
if (!state.person) askWho();
</script>
</body>
</html>
